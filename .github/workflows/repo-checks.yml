name: repo-checks

on:
  push:
  workflow_dispatch:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aionoscope-benchmarks
    steps:
      - uses: actions/checkout@v4
        with:
          path: aionoscope-benchmarks
      - uses: actions/checkout@v4
        with:
          repository: langotime/aionoscope
          path: aionoscope
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync environment
        run: uv sync --extra dev
      - name: Repo contract checks
        run: uv run python -m aionoscope_benchmarks.repo_checks
      - name: Dashboard smoke
        run: uv run python -m aionoscope_benchmarks.dashboard_smoke --max-files 5
      - name: Fast test suite
        run: >
          uv run pytest
          tests/test_repo_contracts.py
          tests/test_dashboard_smoke.py
          tests/test_dashboard_discovery_contract.py
          tests/test_extended_foundation_registry.py
          tests/test_sequence_length_contract.py
          tests/test_run_model_num_enabled_fanout.py
          tests/test_run_model_runtime_summary.py
