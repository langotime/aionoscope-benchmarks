name: weekly-gardening

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  weekly-gardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync environment
        run: uv sync --extra dev
      - name: Repo contract checks
        run: uv run python -m aionoscope_benchmarks.repo_checks
      - name: Dashboard smoke
        run: uv run python -m aionoscope_benchmarks.dashboard_smoke --max-files 5
      - name: Fast documentation and dashboard tests
        run: >
          uv run pytest
          tests/test_repo_contracts.py
          tests/test_dashboard_smoke.py
          tests/test_dashboard_discovery_contract.py
